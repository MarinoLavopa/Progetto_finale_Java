<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:insert="~{index :: head}"></head>
<body>

    <head th:insert="~{index :: navbar}"></head>

    <div class="vh-100">
        <br /><br />
        <div class="container">
            <div class="row">
                <div class="col-md-6 offset-md-3">
                    <div th:if="${param.error}">
                        <div class="alert alert-danger">Invlid Email or Password</div>
                    </div>
                    <div th:if="${param.logout}">
                        <div class="alert alert-success">You have been logged out</div>
                    </div>
                    <div class="card">
                        <div class="card-header">
                            <h2 class="text-center">Login Form</h2>
                        </div>
                        <div class="card-body">
                            <form method="post" role="form" th:action="@{/login}" class="form-horizontal">
                                
                                <div class="form-group mb-3">
                                    <label class="form-label">Email</label>
                                    <input type="text" class="form-control" id="username" name="username" placeholder="Enter email address" />
                                </div>

                                <div class="form-group mb-3">
                                    <label class="form-label">Password</label>
                                    <input type="password" class="form-control" id="password" name="password" placeholder="Enter password"/>
                                </div>

                                <div class="form-group mb-3">
                                    <button type="submit" class="btn btn-primary">Submit</button>
                                    <span>Not registered? <a th:href="@{/register}">Register/Sign up here</a>
                                    </span>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <head th:insert="~{index :: footer}"></head>
    <script th:replace="~{index :: bootstrapScript}"></script>
    
</body>
</html>
