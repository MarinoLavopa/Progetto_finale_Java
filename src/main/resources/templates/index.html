<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- fragment head-->    
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- fragment script bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- fragment script fontawesome-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <title th:text="${title}">Title</title>
    <!-- Fine fragment head-->
</head>
<body>
    <!--inizio navbar-->
    <nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/}">Aulab Chronicle</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li sec:authrize="isAuthenticated" class="nav-item">
                        <a  class="nav-link" href="/articles/create">Crea Articolo</a>
                    </li>
                    <li class="nav-item">
                        <a  class="nav-link" href="/articles">Tutti gli articoli</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a  class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            Accesso
                        </a>
                        <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                            <li sec:authorize="isAnonymous" ><a  class="dropdown-item" aria-current="page" th:href="@{/register}">Register</a></li>
                            <li sec:authorize="isAnonymous"><a  class="dropdown-item" aria-current="page" th:href="@{/login}">Login</a></li>
                            <li sec:authorize="isAuthenticated"><a  class="dropdown-item" aria-current="page" th:href="@{/logout}">Logout</a></li>
                        </ul>
                    </li>
                </ul>
                <div sec:authorize="isAuthenticated" th:text="'Benvenuto: ' + ${#authentication.principal.fullname} + ' - ' + ${#authentication.principal.authorities[0].authority.replace('ROLE_', '')} 
                ">Benvenuto</div>
                
            </div>
        </div>
        <form class="d-flex">
            <input class="form-control me-2" type="search" placeholder="Search" name="Keyword" aria-label="Search">
            <button class="btn btn-outline-success" type="submit">Search</button>
        </form>
    </nav>
    <!--fine navbar-->

    <!--Footer-->
    <footer th:fragment="footer" class="bg-dark text-white pt-4">
        <div class="container">
            <div class="row justify-content-between">
                <!--company info-->
                <div class="col-md-4 mb-3">
                    <a href="/"><h5>Aulab IT</h5></a>
                </div>
                <!--Contact Info-->
                <div class="col-md-4 mb-3 text-end">
                    <h5>Lavora con noi</h5>
                    <a th:href="@{/operations/career/request}" class="btn btn-primary">Richiedi</a>
                </div>
            </div>
        </div>
        <div class="bg-secondary text-center py-2">
            <p class="mb-0">© 2026 Aulab Jost. All rights reserved.</p>
        </div>
    </footer>
    <!--fine footer-->

    <!-- fragment script bootstrap-->
     <script th:fragment="bootstrapScript" src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <!-- fine fragment script bootstrap-->

    
</body>
</html>
